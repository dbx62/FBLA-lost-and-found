{% extends 'base.html' %}

{% block title %}Log In &middot; SLHS Lost &amp; Found{% endblock %}

{% block content %}
<div class="form-container" style="max-width: 420px;">
    <h2 style="text-align: center;">Log in</h2>
    <p class="section-intro" style="text-align: center;">Students use your email. Admins use your username.</p>
    <form method="post">
        <div class="form-group">
            <label for="username">Email or Username</label>
            <input type="text" id="username" name="username" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Log In</button>
    </form>

    <p class="auth-switch">New here? <a href="{{ url_for('register') }}">Create a student account</a></p>
</div>
{% endblock %}
