{% extends 'base.html' %}

{% block title %}Create Account &middot; SLHS Lost &amp; Found{% endblock %}

{% block content %}
<div class="form-container" style="max-width: 480px;">
    <h2 style="text-align: center;">Create your student account</h2>
    <p class="section-intro" style="text-align: center;">Save your details once so reporting and claiming items is faster.</p>

    <form method="post">
        <div class="form-group">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" name="full_name" autocomplete="name" required placeholder="Jane Doe">
        </div>

        <div class="form-group">
            <label for="student_id">Student ID</label>
            <input type="text" id="student_id" name="student_id" required placeholder="e.g., K1234567">
        </div>

        <div class="form-group">
            <label for="email">School Email</label>
            <input type="email" id="email" name="email" autocomplete="email" required placeholder="jane.doe@students.school.edu">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <p class="field-hint">At least 6 characters.</p>
            <input type="password" id="password" name="password" autocomplete="new-password" minlength="6" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</div>
{% endblock %}
